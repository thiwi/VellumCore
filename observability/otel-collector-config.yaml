receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  attributes/sanitize:
    actions:
      - key: db.statement
        action: delete
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: request.body
        action: delete
      - key: response.body
        action: delete
      - key: http.request.header.authorization
        action: delete
      - key: http.response.header.set-cookie
        action: delete
      - key: enduser.id
        action: delete
  batch:
    send_batch_size: 1024
    timeout: 1s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  logging:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/sanitize, batch]
      exporters: [otlp/tempo]
