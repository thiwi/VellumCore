{{- if .Values.frameworkInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vellum-core.fullname" . }}-framework-init
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: {{ .Values.frameworkInit.hookDeletePolicy }}
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vellum-core.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: framework-init
    spec:
      serviceAccountName: {{ include "vellum-core.serviceAccountName" . }}
      restartPolicy: OnFailure
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
      - name: framework-init
        image: "{{ .Values.images.prover.repository }}:{{ .Values.images.prover.tag }}"
        imagePullPolicy: {{ .Values.images.prover.pullPolicy }}
        command: ["/bin/sh", "-c", "/app/setup_framework.sh"]
        env:
{{ include "vellum-core.commonEnv" . | indent 10 }}
        - name: APP_NAME
          value: {{ printf "%s-framework-init" .Values.env.appNamePrefix | quote }}
        - name: SETUP_CIRCUIT_IDS
          value: {{ .Values.frameworkInit.setupCircuitIds | quote }}
        resources:
{{ toYaml .Values.resources.frameworkInit | indent 10 }}
{{- end }}
