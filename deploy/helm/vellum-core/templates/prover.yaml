apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vellum-core.fullname" . }}-prover
spec:
  replicas: {{ .Values.replicaCount.prover }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vellum-core.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: prover
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vellum-core.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: prover
    spec:
      serviceAccountName: {{ include "vellum-core.serviceAccountName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
      - name: prover
        image: "{{ .Values.images.prover.repository }}:{{ .Values.images.prover.tag }}"
        imagePullPolicy: {{ .Values.images.prover.pullPolicy }}
        command: ["uvicorn", "prover_service:app", "--host", "0.0.0.0", "--port", "8001"]
        ports:
        - containerPort: 8001
          name: http
        env:
{{ include "vellum-core.commonEnv" . | indent 10 }}
        - name: APP_NAME
          value: {{ printf "%s-prover" .Values.env.appNamePrefix | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        securityContext:
{{ toYaml .Values.securityContext | indent 10 }}
        resources:
{{ toYaml .Values.resources.prover | indent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vellum-core.fullname" . }}-prover
spec:
  type: {{ .Values.service.prover.type }}
  selector:
    app.kubernetes.io/name: {{ include "vellum-core.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: prover
  ports:
  - name: http
    port: {{ .Values.service.prover.port }}
    targetPort: http
