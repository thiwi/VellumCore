apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vellum-core.fullname" . }}-verifier
spec:
  replicas: {{ .Values.replicaCount.verifier }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vellum-core.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: verifier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vellum-core.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: verifier
    spec:
      serviceAccountName: {{ include "vellum-core.serviceAccountName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
      - name: verifier
        image: "{{ .Values.images.verifier.repository }}:{{ .Values.images.verifier.tag }}"
        imagePullPolicy: {{ .Values.images.verifier.pullPolicy }}
        command: ["uvicorn", "verifier_service:app", "--host", "0.0.0.0", "--port", "8002"]
        ports:
        - containerPort: 8002
          name: http
        env:
{{ include "vellum-core.commonEnv" . | indent 10 }}
        - name: APP_NAME
          value: {{ printf "%s-verifier" .Values.env.appNamePrefix | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        securityContext:
{{ toYaml .Values.securityContext | indent 10 }}
        resources:
{{ toYaml .Values.resources.verifier | indent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vellum-core.fullname" . }}-verifier
spec:
  type: {{ .Values.service.verifier.type }}
  selector:
    app.kubernetes.io/name: {{ include "vellum-core.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: verifier
  ports:
  - name: http
    port: {{ .Values.service.verifier.port }}
    targetPort: http
