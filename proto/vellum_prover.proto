syntax = "proto3";

package vellum.nativeprover;

service Prover {
  rpc GenerateProof(GenerateProofRequest) returns (GenerateProofResponse);
  rpc VerifyProof(VerifyProofRequest) returns (VerifyProofResponse);
}

message GenerateProofRequest {
  string circuit_id = 1;
  string private_input_json = 2;
  string wasm_path = 3;
  string zkey_path = 4;
}

message GenerateProofResponse {
  string proof_json = 1;
  string public_signals_json = 2;
}

message VerifyProofRequest {
  string circuit_id = 1;
  string proof_json = 2;
  string public_signals_json = 3;
  string verification_key_path = 4;
}

message VerifyProofResponse {
  bool valid = 1;
}
