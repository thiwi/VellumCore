services:
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vellum
      POSTGRES_USER: vellum
      POSTGRES_PASSWORD: vellum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum -d vellum"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.16
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["vault", "server", "-dev", "-dev-root-token-id=root", "-dev-listen-address=0.0.0.0:8200"]
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.16
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_AUDIT_KEY: vellum-audit
      VELLUM_BANK_KEY: vellum-bank
      VELLUM_DATA_KEY: vellum-data
    command:
      - /bin/sh
      - -c
      - |
        set -e
        until vault status >/dev/null 2>&1; do sleep 1; done
        vault secrets enable transit || true
        vault write -f transit/keys/$${VELLUM_JWT_KEY} type=ed25519 || true
        vault write -f transit/keys/$${VELLUM_AUDIT_KEY} type=ed25519 || true
        vault write -f transit/keys/$${VELLUM_BANK_KEY} type=ed25519 || true
        vault write -f transit/keys/$${VELLUM_DATA_KEY} type=aes256-gcm96 || true
        echo "vault transit bootstrap completed"
    restart: "no"

  framework-init:
    build:
      context: .
      dockerfile: Dockerfile.prover
    image: vellum/prover:dev
    environment:
      APP_NAME: vellum-framework-init
      CIRCUITS_DIR: /app/circuits
      POLICY_PACKS_DIR: /app/policy_packs
      SHARED_ASSETS_DIR: /shared_assets
      PROOF_OUTPUT_DIR: /shared_assets/proofs
      SNARKJS_BIN: snarkjs
      SETUP_CIRCUIT_IDS: batch_credit_check
      LOG_LEVEL: INFO
    volumes:
      - ./circuits:/app/circuits:ro
      - ./policy_packs:/app/policy_packs:ro
      - shared_assets:/shared_assets
    command: ["/bin/sh", "-c", "/app/setup_framework.sh"]
    depends_on:
      vault-init:
        condition: service_completed_successfully
    restart: "no"

  native-prover:
    build:
      context: .
      dockerfile: Dockerfile.native-prover
      args:
        RAPIDSNARK_DOWNLOAD_URL: ${RAPIDSNARK_DOWNLOAD_URL:-}
        WITNESSCALC_DOWNLOAD_URL: ${WITNESSCALC_DOWNLOAD_URL:-}
    image: vellum/native-prover:dev
    environment:
      NATIVE_PROVER_ADDR: 0.0.0.0:50051
      SNARKJS_BIN: snarkjs
      NATIVE_GENERATE_BACKEND: ${NATIVE_GENERATE_BACKEND:-snarkjs}
      RAPIDSNARK_BIN: ${RAPIDSNARK_BIN:-rapidsnark}
      NATIVE_WITNESS_BACKEND: ${NATIVE_WITNESS_BACKEND:-snarkjs}
      WITNESS_GEN_BIN: ${WITNESS_GEN_BIN:-witnesscalc}
    volumes:
      - shared_assets:/shared_assets
    ports:
      - "50051:50051"
    depends_on:
      framework-init:
        condition: service_completed_successfully
    restart: unless-stopped

  prover:
    build:
      context: .
      dockerfile: Dockerfile.prover
    image: vellum/prover:dev
    environment:
      APP_NAME: vellum-prover
      CIRCUITS_DIR: /app/circuits
      POLICY_PACKS_DIR: /app/policy_packs
      SHARED_ASSETS_DIR: /shared_assets
      PROOF_OUTPUT_DIR: /shared_assets/proofs
      SNARKJS_BIN: snarkjs
      SETUP_CIRCUIT_IDS: batch_credit_check

      DATABASE_URL: postgresql+asyncpg://vellum:vellum@postgres:5432/vellum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_QUEUE: vellum-queue
      REDIS_URL: redis://redis:6379/1

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_AUDIT_KEY: vellum-audit
      VELLUM_BANK_KEY: vellum-bank
      VELLUM_DATA_KEY: vellum-data
      BANK_KEY_ID: bank-key-1
      BANK_KEY_MAPPING_JSON: '{"bank-key-1":"vellum-bank"}'

      SECURITY_PROFILE: dev
      JWT_ISSUER: bank.local
      JWT_AUDIENCE: sentinel-zk
      NONCE_WINDOW_SECONDS: 300
      JWT_MAX_TTL_SECONDS: 900
      JWT_LEEWAY_SECONDS: 30
      METRICS_REQUIRE_AUTH: "false"
      SUBMIT_RATE_LIMIT_PER_MINUTE: 120
      MAX_SUBMIT_BODY_BYTES: 1048576
      CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: 50
      CELERY_TASK_TIME_LIMIT_SECONDS: 60
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 100
      PROOF_JOB_MAX_ATTEMPTS: 3
      PROVER_MAX_PARALLEL_PROOFS: 2
      VAULT_PUBLIC_KEY_CACHE_TTL_SECONDS: 300
      NATIVE_VERIFY_BASELINE_SECONDS: 0.000005
      PROOF_PROVIDER_MODE: ${PROOF_PROVIDER_MODE:-grpc}
      GRPC_PROVER_ENDPOINT: ${GRPC_PROVER_ENDPOINT:-native-prover:50051}
      GRPC_PROVER_TIMEOUT_SECONDS: ${GRPC_PROVER_TIMEOUT_SECONDS:-30}
      PROOF_SHADOW_MODE: "false"
      PROOF_SHADOW_PROVIDER_MODE: grpc
      PROOF_SHADOW_COMPARE_PUBLIC_SIGNALS: "false"
      GRPC_CUTOVER_GATE_ENFORCED: "false"
      GRPC_CUTOVER_GATE_REPORT_PATH: ""
      JOB_RUNTIME_RETENTION_DAYS: ${JOB_RUNTIME_RETENTION_DAYS:-7}
      FILE_ARCHIVE_AFTER_DAYS: ${FILE_ARCHIVE_AFTER_DAYS:-30}
      MAINTENANCE_INTERVAL_SECONDS: ${MAINTENANCE_INTERVAL_SECONDS:-3600}
      MAINTENANCE_CYCLE_FILE_SCAN_LIMIT: ${MAINTENANCE_CYCLE_FILE_SCAN_LIMIT:-1000}
      LOG_LEVEL: INFO
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_FASTAPI_EXCLUDED_URLS: /healthz,/metrics
    volumes:
      - ./circuits:/app/circuits:ro
      - ./policy_packs:/app/policy_packs:ro
      - shared_assets:/shared_assets
    ports:
      - "8001:8001"
    command: ["uvicorn", "prover_service:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      framework-init:
        condition: service_completed_successfully
      native-prover:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prover
    image: vellum/worker:dev
    environment:
      APP_NAME: vellum-worker
      CIRCUITS_DIR: /app/circuits
      POLICY_PACKS_DIR: /app/policy_packs
      SHARED_ASSETS_DIR: /shared_assets
      PROOF_OUTPUT_DIR: /shared_assets/proofs
      SNARKJS_BIN: snarkjs

      DATABASE_URL: postgresql+asyncpg://vellum:vellum@postgres:5432/vellum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_QUEUE: vellum-queue
      REDIS_URL: redis://redis:6379/1

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_AUDIT_KEY: vellum-audit
      VELLUM_BANK_KEY: vellum-bank
      VELLUM_DATA_KEY: vellum-data
      BANK_KEY_ID: bank-key-1
      BANK_KEY_MAPPING_JSON: '{"bank-key-1":"vellum-bank"}'

      SECURITY_PROFILE: dev
      JWT_ISSUER: bank.local
      JWT_AUDIENCE: sentinel-zk
      NONCE_WINDOW_SECONDS: 300
      JWT_MAX_TTL_SECONDS: 900
      JWT_LEEWAY_SECONDS: 30
      SUBMIT_RATE_LIMIT_PER_MINUTE: 120
      MAX_SUBMIT_BODY_BYTES: 1048576
      CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: 50
      CELERY_TASK_TIME_LIMIT_SECONDS: 60
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 100
      PROOF_JOB_MAX_ATTEMPTS: 3
      METRICS_REQUIRE_AUTH: "false"
      PROVER_MAX_PARALLEL_PROOFS: 2
      VAULT_PUBLIC_KEY_CACHE_TTL_SECONDS: 300
      PROOF_PROVIDER_MODE: ${PROOF_PROVIDER_MODE:-grpc}
      GRPC_PROVER_ENDPOINT: ${GRPC_PROVER_ENDPOINT:-native-prover:50051}
      GRPC_PROVER_TIMEOUT_SECONDS: ${GRPC_PROVER_TIMEOUT_SECONDS:-30}
      PROOF_SHADOW_MODE: "false"
      PROOF_SHADOW_PROVIDER_MODE: grpc
      PROOF_SHADOW_COMPARE_PUBLIC_SIGNALS: "false"
      GRPC_CUTOVER_GATE_ENFORCED: "false"
      GRPC_CUTOVER_GATE_REPORT_PATH: ""
      JOB_RUNTIME_RETENTION_DAYS: ${JOB_RUNTIME_RETENTION_DAYS:-7}
      FILE_ARCHIVE_AFTER_DAYS: ${FILE_ARCHIVE_AFTER_DAYS:-30}
      MAINTENANCE_INTERVAL_SECONDS: ${MAINTENANCE_INTERVAL_SECONDS:-3600}
      MAINTENANCE_CYCLE_FILE_SCAN_LIMIT: ${MAINTENANCE_CYCLE_FILE_SCAN_LIMIT:-1000}
      WORKER_METRICS_HOST: 0.0.0.0
      WORKER_METRICS_PORT: 9108
      LOG_LEVEL: INFO
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    volumes:
      - ./circuits:/app/circuits:ro
      - ./policy_packs:/app/policy_packs:ro
      - shared_assets:/shared_assets
    command: ["sh", "-c", "celery -A worker:celery_app worker -Q \"$$CELERY_QUEUE\" --loglevel=\"$$LOG_LEVEL\" --concurrency=\"$$PROVER_MAX_PARALLEL_PROOFS\""]
    ports:
      - "9108:9108"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      framework-init:
        condition: service_completed_successfully
      native-prover:
        condition: service_started
      prover:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    restart: unless-stopped

  maintenance:
    build:
      context: .
      dockerfile: Dockerfile.prover
    image: vellum/maintenance:dev
    environment:
      APP_NAME: vellum-maintenance
      CIRCUITS_DIR: /app/circuits
      POLICY_PACKS_DIR: /app/policy_packs
      SHARED_ASSETS_DIR: /shared_assets
      PROOF_OUTPUT_DIR: /shared_assets/proofs
      SNARKJS_BIN: snarkjs
      DATABASE_URL: postgresql+asyncpg://vellum:vellum@postgres:5432/vellum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_QUEUE: vellum-queue
      REDIS_URL: redis://redis:6379/1
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_AUDIT_KEY: vellum-audit
      VELLUM_BANK_KEY: vellum-bank
      VELLUM_DATA_KEY: vellum-data
      BANK_KEY_ID: bank-key-1
      BANK_KEY_MAPPING_JSON: '{"bank-key-1":"vellum-bank"}'
      SECURITY_PROFILE: dev
      JWT_ISSUER: bank.local
      JWT_AUDIENCE: sentinel-zk
      NONCE_WINDOW_SECONDS: 300
      JWT_MAX_TTL_SECONDS: 900
      JWT_LEEWAY_SECONDS: 30
      SUBMIT_RATE_LIMIT_PER_MINUTE: 120
      MAX_SUBMIT_BODY_BYTES: 1048576
      CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: 50
      CELERY_TASK_TIME_LIMIT_SECONDS: 60
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 100
      PROOF_JOB_MAX_ATTEMPTS: 3
      METRICS_REQUIRE_AUTH: "false"
      PROVER_MAX_PARALLEL_PROOFS: 1
      VAULT_PUBLIC_KEY_CACHE_TTL_SECONDS: 300
      PROOF_PROVIDER_MODE: grpc
      GRPC_PROVER_ENDPOINT: native-prover:50051
      GRPC_PROVER_TIMEOUT_SECONDS: 30
      PROOF_SHADOW_MODE: "false"
      PROOF_SHADOW_PROVIDER_MODE: grpc
      PROOF_SHADOW_COMPARE_PUBLIC_SIGNALS: "false"
      GRPC_CUTOVER_GATE_ENFORCED: "false"
      GRPC_CUTOVER_GATE_REPORT_PATH: ""
      JOB_RUNTIME_RETENTION_DAYS: ${JOB_RUNTIME_RETENTION_DAYS:-7}
      FILE_ARCHIVE_AFTER_DAYS: ${FILE_ARCHIVE_AFTER_DAYS:-30}
      MAINTENANCE_INTERVAL_SECONDS: ${MAINTENANCE_INTERVAL_SECONDS:-3600}
      MAINTENANCE_CYCLE_FILE_SCAN_LIMIT: ${MAINTENANCE_CYCLE_FILE_SCAN_LIMIT:-1000}
      LOG_LEVEL: INFO
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    volumes:
      - ./circuits:/app/circuits:ro
      - ./policy_packs:/app/policy_packs:ro
      - shared_assets:/shared_assets
    command: ["python", "maintenance_worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      framework-init:
        condition: service_completed_successfully
      native-prover:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  verifier:
    build:
      context: .
      dockerfile: Dockerfile.verifier
    image: vellum/verifier:dev
    environment:
      APP_NAME: vellum-verifier
      CIRCUITS_DIR: /app/circuits
      POLICY_PACKS_DIR: /app/policy_packs
      SHARED_ASSETS_DIR: /shared_assets
      SNARKJS_BIN: snarkjs

      DATABASE_URL: postgresql+asyncpg://vellum:vellum@postgres:5432/vellum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_QUEUE: vellum-queue
      REDIS_URL: redis://redis:6379/1

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_AUDIT_KEY: vellum-audit
      VELLUM_BANK_KEY: vellum-bank
      VELLUM_DATA_KEY: vellum-data
      BANK_KEY_ID: bank-key-1
      BANK_KEY_MAPPING_JSON: '{"bank-key-1":"vellum-bank"}'

      SECURITY_PROFILE: dev
      JWT_ISSUER: bank.local
      JWT_AUDIENCE: sentinel-zk
      NONCE_WINDOW_SECONDS: 300
      JWT_MAX_TTL_SECONDS: 900
      JWT_LEEWAY_SECONDS: 30
      METRICS_REQUIRE_AUTH: "false"
      SUBMIT_RATE_LIMIT_PER_MINUTE: 120
      VAULT_PUBLIC_KEY_CACHE_TTL_SECONDS: 300
      PROOF_PROVIDER_MODE: grpc
      GRPC_PROVER_ENDPOINT: native-prover:50051
      GRPC_PROVER_TIMEOUT_SECONDS: 60
      PROOF_SHADOW_MODE: "false"
      PROOF_SHADOW_PROVIDER_MODE: grpc
      PROOF_SHADOW_COMPARE_PUBLIC_SIGNALS: "false"
      NATIVE_VERIFY_BASELINE_SECONDS: 0.000005
      LOG_LEVEL: INFO
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_FASTAPI_EXCLUDED_URLS: /healthz,/metrics
    volumes:
      - ./circuits:/app/circuits:ro
      - ./policy_packs:/app/policy_packs:ro
      - shared_assets:/shared_assets
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      framework-init:
        condition: service_completed_successfully
      native-prover:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: vellum/dashboard:dev
    environment:
      PROVER_URL: http://prover:8001
      VERIFIER_URL: http://verifier:8002
      JWT_ISSUER: bank.local
      JWT_AUDIENCE: sentinel-zk
      BANK_KEY_ID: bank-key-1
      CIRCUITS_DIR: /app/circuits

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VELLUM_JWT_KEY: vellum-jwt
      VELLUM_BANK_KEY: vellum-bank
      SECURITY_PROFILE: dev
      DASHBOARD_MAX_DEMO_PROVE_BODY_BYTES: 1048576
      APP_NAME: vellum-dashboard
      LOG_LEVEL: INFO
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_FASTAPI_EXCLUDED_URLS: /healthz
    depends_on:
      prover:
        condition: service_healthy
      verifier:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./circuits:/app/circuits:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  shared_assets:
  postgres_data:
  tempo_data:
  grafana_data:
