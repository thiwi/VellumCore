name: Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  SECURITY_PROFILE: dev
  VELLUM_DATA_KEY: vellum-data

jobs:
  nightly_e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Nightly E2E matrix
        run: RUN_E2E=1 python -m pytest -m "e2e and nightly"
