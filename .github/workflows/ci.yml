name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  SECURITY_PROFILE: dev
  VELLUM_DATA_KEY: vellum-data

jobs:
  lint_type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Policy Compiler Drift Gate
        run: >
          python -m vellum_core.policy_compiler.cli check-drift
          policy_packs/lending_risk_v1/policy_spec.yaml
          --repo-root . &&
          python -m vellum_core.policy_compiler.cli check-drift
          policy_packs/lending_risk_portfolio_v1/policy_spec.yaml
          --repo-root .
      - name: MyPy
        run: >
          mypy --follow-imports=skip --ignore-missing-imports
          vellum_core/api/attestation_service.py
          vellum_core/api/policy_engine.py
          vellum_core/policy_registry.py
          vellum_core/policy_runtime.py

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Unit tests
        run: python -m pytest -m unit

  integration_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Integration tests
        run: python -m pytest -m integration

  contract_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Contract tests
        run: python -m pytest -m contract

  security_regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Security regression tests
        run: python -m pytest -m security

  critical_e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Critical E2E
        run: RUN_E2E=1 python -m pytest -m "e2e and critical"

  package_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

  native_prover_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Native prover unit tests
        run: cargo test --manifest-path native_prover/Cargo.toml

  release_readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release artifacts
        run: |
          test -f CHANGELOG.md
          test -f docs/MIGRATION_V4_TO_V5.md
          ls docs/releases/*.md

  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Dependency scan
        run: pip-audit -r requirements.txt
