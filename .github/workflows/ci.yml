name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SECURITY_PROFILE: dev
  VELLUM_DATA_KEY: vellum-data
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.code == 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  lint_type:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping lint/type gates."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Ruff
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: ruff check .
      - name: Requirements Drift Gate
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: python scripts/sync_requirements.py check
      - name: Policy Compiler Drift Gate
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: >
          python -m vellum_core.policy_compiler.cli check-drift
          policy_packs/lending_risk_v1/policy_spec.yaml
          --repo-root . &&
          python -m vellum_core.policy_compiler.cli check-drift
          policy_packs/lending_risk_portfolio_v1/policy_spec.yaml
          --repo-root .
      - name: MyPy
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: >
          mypy --follow-imports=skip --ignore-missing-imports
          vellum_core/api/attestation_service.py
          vellum_core/api/policy_engine.py
          vellum_core/policy_registry.py
          vellum_core/policy_runtime.py

  unit_tests:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping unit tests."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Unit tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: python -m pytest -m unit

  integration_tests:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping integration tests."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Integration tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: python -m pytest -m integration

  contract_tests:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping contract tests."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Contract tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: python -m pytest -m contract

  security_regression:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping security regression tests."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Security regression tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: python -m pytest -m security

  critical_e2e:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping critical e2e."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - name: Critical E2E
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: RUN_E2E=1 python -m pytest -m "e2e and critical"

  package_build:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping package build."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        with:
          install-target: "."
      - name: Build package
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: |
          pip install build
          python -m build

  native_prover_tests:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping native prover tests."
      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
      - uses: Swatinem/rust-cache@v2
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        with:
          workspaces: native_prover
      - name: Install protoc
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Native prover unit tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: cargo test --manifest-path native_prover/Cargo.toml

  release_readiness:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@v4
      - name: Verify release artifacts
        run: |
          test -f CHANGELOG.md
          test -f docs/MIGRATION_V4_TO_V5.md
          ls docs/releases/*.md

  security_scan:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Docs-only PR short-circuit
        if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR detected; skipping dependency scan."
      - uses: ./.github/actions/python-dev-setup
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        with:
          install-target: "."
      - name: Install audit tool
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: pip install pip-audit
      - name: Dependency scan
        if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: pip-audit -r requirements.txt
