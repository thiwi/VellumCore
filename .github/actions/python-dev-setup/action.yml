name: Setup Python Dev Environment
description: Checkout repository, setup Python with cache, and install project dependencies.
inputs:
  python-version:
    description: Python version for setup-python.
    required: false
    default: "3.11"
  install-target:
    description: Pip install target used with editable install.
    required: false
    default: ".[dev]"
  cache-dependency-path:
    description: Dependency files used to key pip cache.
    required: false
    default: |
      pyproject.toml
      requirements.txt
      requirements-dev.txt
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e "${{ inputs.install-target }}"
