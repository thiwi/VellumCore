[pytest]
addopts = --strict-markers
testpaths = tests
markers =
    unit: fast isolated unit tests
    integration: integration tests for framework modules and service adapters
    e2e: end-to-end docker compose tests
    critical: critical-path e2e tests intended for PR validation
    nightly: extended e2e matrix intended for nightly runs
    contract: API and schema contract tests for public interfaces
    security: security regression tests that must remain blocking
