repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic==2.11.7]
        args:
          [
            "--follow-imports=skip",
            "--ignore-missing-imports",
            "vellum_core/api/attestation_service.py",
            "vellum_core/api/policy_engine.py",
            "vellum_core/policy_registry.py",
            "vellum_core/policy_runtime.py",
          ]
